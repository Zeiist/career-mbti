<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career-MBTI 职业人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-page {
            text-align: center;
            padding: 80px 20px;
        }
        
        .welcome-title {
            font-size: 56px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        
        .start-btn {
            padding: 18px 60px;
            font-size: 20px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        
        .quiz-page {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .progress-text {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .progress-track {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .question-text {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option-btn {
            padding: 18px 30px;
            font-size: 16px;
            color: #2c3e50;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .option-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .result-page {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .result-code {
            font-size: 80px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .result-name {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        .result-description {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.8;
            text-align: center;
        }
        
        .jobs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .job-tag {
            padding: 12px 24px;
            font-size: 14px;
            color: #667eea;
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .job-tag:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            color: #7f8c8d;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .modal-close:hover {
            color: #2c3e50;
        }
        
        .modal-title {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-right: 40px;
        }
        
        .modal-section {
            margin-bottom: 25px;
        }
        
        .modal-section h3 {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 12px;
        }
        
        .modal-section p {
            font-size: 15px;
            color: #5a6c7d;
            line-height: 1.8;
        }
        
        .modal-section ul {
            list-style: none;
            padding: 0;
        }
        
        .modal-section li {
            font-size: 15px;
            color: #5a6c7d;
            line-height: 1.8;
            padding-left: 20px;
            position: relative;
        }
        
        .modal-section li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        .restart-btn {
            display: block;
            margin: 40px auto 0;
            padding: 15px 50px;
            font-size: 16px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 36px;
            }
            
            .quiz-page,
            .result-page {
                padding: 30px 20px;
            }
            
            .result-code {
                font-size: 60px;
            }
        }
    </style>
</head>

            "EIFJ": ["社会企业创始人", "企业社会责任负责人", "法律顾问"],
            "EIFP": ["精品投行高级顾问", "理财顾问", "法律顾问"],
            "CETJ": ["首席运营官", "运营总监", "行政经理"],
            "CETP": ["精益生产管理顾问", "运营专员", "物流专员"],
            "CEFJ": ["医疗行政患者体验官", "客服专员", "行政专员/助理"],
            "CEFP": ["行政前台与访客体验专员", "客服专员", "收银员"],
            "CITJ": ["精算师", "会计", "审计师"],
            "CITP": ["法务会计欺诈调查师", "数据分析师", "审计师"],
            "CIFJ": ["档案管理局编研处处长", "档案管理员", "图书馆员"],
            "CIFP": ["古籍修复师", "花艺师", "美甲师"]
        };
        
        // 全局变量
        let currentQuestion = 0;
        let answers = [];
        
        // 开始测试
        function startTest() {
            currentQuestion = 0;
            answers = [];
            showPage('quizPage');
            displayQuestion();
        }
        
        // 显示页面
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }
        
        // 显示题目
        function displayQuestion() {
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;
            const progress = ((currentQuestion + 1) / 24 * 100).toFixed(2);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionText').textContent = (currentQuestion + 1) + '. ' + questions[currentQuestion];
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = ['基本没有 · 1分', '有一点 · 2分', '较多时候 · 3分', '非常多时候 · 4分', '几乎完全 · 5分'];
            options.forEach((text, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = text;
                btn.onclick = () => selectOption(index + 1);
                container.appendChild(btn);
            });
        }
        
        // 选择选项
        function selectOption(score) {
            answers.push(score);
            if (currentQuestion < 23) {
                currentQuestion++;
                displayQuestion();
            } else {
                calculateResult();
            }
        }
        
        // 计算结果
        function calculateResult() {
            const s = answers;
            
            // 第一位字母（兴趣核心）
            const r = [s[0], s[1], s[2], s[3], s[4], s[5]];
            const m = Math.max(...r);
            const p = ['R', 'I', 'A', 'S', 'E', 'C'];
            let first = 'R';
            for (let i = 0; i < 6; i++) {
                if (r[i] === m) {
                    first = p[i];
                    break;
                }
            }
            
            // 第二位字母（能量取向）
            const e = s[7] + s[8] + s[11];
            const ie = s[6] + s[9] + s[10];
            const second = e > ie ? 'E' : 'I';
            
            // 第三位字母（决策依据）
            const t = s[12] + s[14] + s[16];
            const f = s[13] + s[15] + s[17];
            const third = t > f ? 'T' : 'F';
            
            // 第四位字母（行动模式）
            const j = s[18] + s[20] + s[22];
            const p2 = s[19] + s[21] + s[23];
            const fourth = j > p2 ? 'J' : 'P';
            
            const code = first + second + third + fourth;
            
            document.getElementById('resultCode').textContent = code;
            document.getElementById('resultName').textContent = typeNames[code] || '未知类型';
            
            const jobs = jobLists[code] || [];
            const container = document.getElementById('jobsContainer');
            container.innerHTML = '';
            
            if (jobs.length > 0) {
                const title = document.createElement('h3');
                title.style.cssText = 'width: 100%; text-align: center; color: #2c3e50; margin-bottom: 20px;';
                title.textContent = '推荐岗位';
                container.appendChild(title);
                
                jobs.forEach(job => {
                    const tag = document.createElement('button');
                    tag.className = 'job-tag';
                    tag.textContent = job;
                    tag.onclick = () => showJobDetail(job);
                    container.appendChild(tag);
                });
            }
            
            showPage('resultPage');
        }
        
        // 显示岗位详情
        function showJobDetail(jobName) {
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = jobName;
            
            // 检查是否有岗位详情数据
            if (typeof jobDetails !== 'undefined' && jobDetails[jobName]) {
                const detail = jobDetails[jobName];
                body.innerHTML = `
                    <div class="modal-section">
                        <h3>📋 岗位介绍</h3>
                        <p>${detail.intro}</p>
                    </div>
                    <div class="modal-section">
                        <h3>💰 最新薪资</h3>
                        <p>${detail.salary}</p>
                    </div>
                    <div class="modal-section">
                        <h3>✅ 具体要求</h3>
                        <ul>
                            ${detail.requirements.map(req => `<li>${req}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } else {
                body.innerHTML = `
                    <div class="modal-section">
                        <h3>📋 岗位介绍</h3>
                        <p>该岗位的详细介绍信息正在完善中...</p>
                    </div>
                    <div class="modal-section">
                        <h3>💰 最新薪资</h3>
                        <p>薪资信息正在完善中...</p>
                    </div>
                    <div class="modal-section">
                        <h3>✅ 具体要求</h3>
                        <ul>
                            <li>具体要求正在完善中...</li>
                        </ul>
                    </div>
                `;
            }
            
            modal.classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
        
        // 重新测试
        function restartTest() {
            showPage('welcomePage');
        }
        
        // 点击弹窗外部关闭
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
