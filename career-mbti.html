<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career-MBTI 职业人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-page {
            text-align: center;
            padding: 80px 20px;
        }
        
        .welcome-title {
            font-size: 56px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        
        .start-btn {
            padding: 18px 60px;
            font-size: 20px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        
        .quiz-page {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .progress-text {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .progress-track {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 4px;
        }
        
        .question-text {
            font-size: 20px;
            line-height: 1.8;
            color: #2c3e50;
            margin-bottom: 40px;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .option-btn {
            padding: 16px 24px;
            font-size: 16px;
            color: #34495e;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin: 8px 0;
            text-align: center;
        }
        
        .option-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .result-page {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .result-code {
            font-size: 64px;
            font-weight: 700;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .result-name {
            font-size: 28px;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
        }
        
        .jobs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .job-tag {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            border: none;
        }
        
        .job-tag:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .restart-btn {
            display: block;
            margin: 50px auto 0;
            padding: 14px 40px;
            font-size: 16px;
            color: #667eea;
            background: white;
            border: 2px solid #667eea;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border: none;
            background: #ecf0f1;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background: #e74c3c;
            color: white;
        }
        
        .modal-title {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-right: 40px;
        }
        
        .modal-section {
            margin-bottom: 25px;
        }
        
        .modal-section h3 {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .modal-section p {
            font-size: 15px;
            line-height: 1.6;
            color: #34495e;
        }
        
        .modal-section ul {
            list-style: none;
            padding-left: 0;
        }
        
        .modal-section li {
            font-size: 14px;
            line-height: 1.8;
            color: #34495e;
            padding-left: 20px;
            position: relative;
        }
        
        .modal-section li:before {
            content: "•";
            color: #667eea;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 36px;
            }
            
            .quiz-page, .result-page {
                padding: 30px 20px;
            }
            
            .question-text {
                font-size: 18px;
            }
            
            .result-code {
                font-size: 48px;
            }
        }
    </style>
</head>

            "当朋友陷入情绪低谷或生活瓶颈时，我总会被一种本能牵引，想去倾听、去共情，并在对方允许下，通过对话慢慢帮他看清内心的雾霭。",
            "在一群人中，我自然会对局面进行评估，乐于提出方向、分配角色并推动大家迅速行动，我相信良性竞争与目标导向能让事情更好。",
            "使用系统化的流程处理信息让我满足。为混乱的数据、文档或日程建立清晰精确的体系，并按规则核对与维护，这本身就是一种秩序的美感。",
            "忙碌一天后，我最理想的充电方式是一个人安静地反思消化、沉浸于个人兴趣或仅仅享受不被打扰的独处时光。",
            "在高质量的社交或小组头脑风暴中，我感觉自己像一块海绵扔进了水里，不断吸收新角度，离开时能量往往比来时更高昂。",
            "我的最佳思考往往通过\"说出来\"完成，需要身边有回应的耳朵或搭档，独自闭门苦思反而容易让想法枯竭或胶着。",
            "投入一个需要深度专注的长期项目时，我倾向于拥有不被打断的整块时间和私密空间，过多中途交谈会让我能量涣散。",

            "做出重大选择时，我的第一反应是列出利弊清单，权衡客观标准与效率。若一个方案逻辑上最正确，即使可能让部分人不快，我仍倾向执行。",
            "看到某个流程或规则在执行中让身边人感到委屈或不适，我内心会一直悬挂此事，并本能思考如何在不伤人的前提下做出调整。",
            "进行争论时，我更享受基于事实和严密论证的交锋，认为\"谁对\"比\"谁感觉好\"重要，真理越辩越明。",
            "一个决定即便逻辑上无懈可击，但如果它违背了我内心看重的价值观或伤害了团队情感氛围，我最终很难真正认同它。",
            "对于优异者的评判，我脑中自然采用明确统一的原则性标尺，达成即是达成，不会因为对方的个人故事或关系轻易调松准线。",
            "当团队面临选择，我习惯先感知每个人微妙的态度与需求，努力寻找一个能尽量让各方内心认可、关系得以维系的方向。",
            "开始任何项目前，制定明确步骤与分阶段截止日能让我彻底安心，看到待办清单上被勾掉的条目如同卸下重担。",
            "保持选择的开放空间对我至关重要。过早确定某一路径会让我有压迫感，我喜欢感觉\"一切皆有可能\"，可以随着新信息涌现转向。",

        // 全局变量
        let currentQuestion = 0;
        let answers = [];
        
        // 开始测试
        function startTest() {
            currentQuestion = 0;
            answers = [];
            showPage('quizPage');
            displayQuestion();
        }
        
        // 显示页面
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }
        
        // 显示题目
        function displayQuestion() {
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;
            const progress = ((currentQuestion + 1) / 24 * 100).toFixed(2);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionText').textContent = (currentQuestion + 1) + '. ' + questions[currentQuestion];
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = ['基本没有 · 1分', '有一点 · 2分', '较多时候 · 3分', '非常多时候 · 4分', '几乎完全 · 5分'];
            options.forEach((text, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = text;
                btn.onclick = () => selectOption(index + 1);
                container.appendChild(btn);
            });
        }
        
        // 选择选项
        function selectOption(score) {
            answers.push(score);
            if (currentQuestion < 23) {
                currentQuestion++;
                displayQuestion();
            } else {
                calculateResult();
            }
        }
        
        // 计算结果
        function calculateResult() {
            const s = answers;
            
            // 第一位字母（兴趣核心）
            const r = [s[0], s[1], s[2], s[3], s[4], s[5]];
            const m = Math.max(...r);
            const p = ['R', 'I', 'A', 'S', 'E', 'C'];
            let first = 'R';
            for (let i = 0; i < 6; i++) {
                if (r[i] === m) {
                    first = p[i];
                    break;
                }
            }
            
            // 第二位字母（能量取向）
            const e = s[7] + s[8] + s[11];
            const ie = s[6] + s[9] + s[10];
            const second = e > ie ? 'E' : 'I';
            
            // 第三位字母（决策依据）
            const t = s[12] + s[14] + s[16];
            const f = s[13] + s[15] + s[17];
            const third = t > f ? 'T' : 'F';
            
            // 第四位字母（行动模式）
            const j = s[18] + s[20] + s[22];
            const p2 = s[19] + s[21] + s[23];
            const fourth = j > p2 ? 'J' : 'P';
            
            const code = first + second + third + fourth;
            
            document.getElementById('resultCode').textContent = code;
            document.getElementById('resultName').textContent = typeNames[code] || '未知类型';
            
            const jobs = jobLists[code] || [];
            const container = document.getElementById('jobsContainer');
            container.innerHTML = '';
            
            if (jobs.length > 0) {
                const title = document.createElement('h3');
                title.style.cssText = 'width: 100%; text-align: center; color: #2c3e50; margin-bottom: 20px;';
                title.textContent = '推荐岗位';
                container.appendChild(title);
                
                jobs.forEach(job => {
                    const tag = document.createElement('button');
                    tag.className = 'job-tag';
                    tag.textContent = job;
                    tag.onclick = () => showJobDetail(job);
                    container.appendChild(tag);
                });
            }
            
            showPage('resultPage');
        }

                            完整的岗位介绍、薪资和要求需要补充 jobDetails 对象的数据。
                        </p>
                    </div>
                `;
            }
            
            modal.classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
        
        // 重新测试
        function restartTest() {
            showPage('welcomePage');
        }
        
        // 点击弹窗外部关闭
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        });
        
        // 初始化
        displayQuestion();
    </script>
</body>
